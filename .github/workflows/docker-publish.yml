name: Build and Push Docker Image to GHCR

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: paperspace-comfyui-qwen35-stable
  LLAMA_WHL_FILE: llama_cpp_python-0.3.32+cu128.basic-cp311-cp311-linux_x86_64.whl
  LLAMA_WHL_URL: https://github.com/yumi1129/paperspace-comfyui_qwen3.5ggufLlma/releases/download/v1/llama_cpp_python-0.3.32+cu128.basic-cp311-cp311-linux_x86_64.whl

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download llama-cpp wheel into build context
        run: |
          curl -fL "${LLAMA_WHL_URL}" -o "${LLAMA_WHL_FILE}"
          ls -lh "${LLAMA_WHL_FILE}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
